<div class="form-group">
  <label for="password">Password</label>
  <div class="input-wrapper">
    <span class="input-icon">🔒</span>
    <input type="password" id="password" placeholder="Enter your password" />
    <button type="button" id="toggle-password" class="toggle-password">
      👁️ const togglePassword = document.getElementById('toggle-password') const
      passwordInput = document.getElementById('password')
      togglePassword.addEventListener('click', () => { const isPassword =
      passwordInput.type === 'password' passwordInput.type = isPassword ? 'text'
      : 'password' togglePassword.textContent = isPassword ? '🙈' : '👁️' })
    </button>
  </div>
</div>
<div class="bg-pattern">
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>
</div>
