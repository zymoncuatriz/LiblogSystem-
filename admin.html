<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="dashboard-container">
      <div class="navbar">
        <h1 class="nav-title">NEU Library — Admin</h1>
        <button id="logout-btn" class="logout-btn">Log Out</button>
      </div>

      <div class="main-content">
        <div class="filters-box">
          <h3>Filter Visitors</h3>
          <div class="filters-row">
            <div class="filter-group">
              <label>Date Range</label>
              <select id="date-filter">
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="custom">Custom Range</option>
              </select>
            </div>

            <div class="filter-group" id="custom-range" style="display: none">
              <label>From</label>
              <input type="date" id="date-from" />
            </div>

            <div
              class="filter-group"
              id="custom-range-to"
              style="display: none"
            >
              <label>To</label>
              <input type="date" id="date-to" />
            </div>

            <div class="filter-group">
              <label>Reason</label>
              <select id="reason-filter">
                <option value="">All Reasons</option>
                <option value="Studying">Studying</option>
                <option value="Borrowing Books">Borrowing Books</option>
                <option value="Research">Research</option>
                <option value="Group Work">Group Work</option>
                <option value="Printing">Printing</option>
              </select>
            </div>

            <div class="filter-group">
              <label>College</label>
              <select id="college-filter">
                <option value="">All Colleges</option>
                <option value="College of Engineering">Engineering</option>
                <option value="College of Business">Business</option>
                <option value="College of Arts">Arts</option>
                <option value="College of Nursing">Nursing</option>
                <option value="College of Education">Education</option>
              </select>
            </div>

            <div class="filter-group">
              <label>Visitor Type</label>
              <select id="employee-filter">
                <option value="">All</option>
                <option value="employee">Employee</option>
                <option value="student">Student</option>
              </select>
            </div>

            <div class="filter-group">
              <button id="apply-btn" class="apply-btn">Apply Filters</button>
            </div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-info">
              <p class="stat-label">Total Visitors</p>
              <h2 id="total-visitors" class="stat-value">0</h2>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🎓</div>
            <div class="stat-info">
              <p class="stat-label">Students</p>
              <h2 id="total-students" class="stat-value">0</h2>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">👔</div>
            <div class="stat-info">
              <p class="stat-label">Employees</p>
              <h2 id="total-employees" class="stat-value">0</h2>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📖</div>
            <div class="stat-info">
              <p class="stat-label">Top Reason</p>
              <h2 id="top-reason" class="stat-value">—</h2>
            </div>
          </div>
        </div>

        <div class="charts-grid">
          <div class="chart-card">
            <h3>Visitors Per Day</h3>
            <canvas id="chart-per-day"></canvas>
          </div>
          <div class="chart-card">
            <h3>Visitors by Reason</h3>
            <canvas id="chart-by-reason"></canvas>
          </div>
          <div class="chart-card">
            <h3>Visitors by College</h3>
            <canvas id="chart-by-college"></canvas>
          </div>
          <div class="chart-card">
            <h3>Student vs Employee</h3>
            <canvas id="chart-by-type"></canvas>
          </div>
        </div>

        <div class="table-box">
          <h3>Visitor Log</h3>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Student ID</th>
                <th>College</th>
                <th>Reason</th>
                <th>Type</th>
                <th>Date</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="visitors-table">
              <tr>
                <td colspan="7" class="empty-msg">Loading...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
