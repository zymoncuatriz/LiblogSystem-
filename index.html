<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library — Log System</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">NEU</div>
          <div class="login-logo-text">
            <h1>NEU Library</h1>
            <p>Visitor Log System</p>
          </div>
        </div>

        <div id="error-msg" class="error-msg hidden"></div>

        <div class="form-group">
          <label for="identifier">Student ID or Email</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="identifier"
              placeholder="Enter your Student ID or Email"
              autocomplete="off"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input
              type="password"
              id="password"
              placeholder="Enter your password"
            />
          </div>
        </div>

        <button id="login-btn" class="btn-primary">Log In</button>

        <div class="login-footer">
          <button class="dark-toggle" id="dark-toggle">🌙 Dark Mode</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
      const toggle = document.getElementById("dark-toggle");
      const saved = localStorage.getItem("theme");
      if (saved === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
        toggle.textContent = "☀️ Light Mode";
      }
      toggle.addEventListener("click", () => {
        const isDark =
          document.documentElement.getAttribute("data-theme") === "dark";
        if (isDark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("theme", "light");
          toggle.textContent = "🌙 Dark Mode";
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
          toggle.textContent = "☀️ Light Mode";
        }
      });
    </script>
  </body>
</html>
