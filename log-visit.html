<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library - Log Visit</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="log-visit.css" />
  </head>
  <body>
    <div class="navbar">
      <h1 class="nav-title">NEU Library</h1>
      <button id="logout-btn" class="logout-btn">Log Out</button>
    </div>

    <div class="log-container">
      <div class="log-box">
        <div class="log-header">
          <div class="log-icon">📋</div>
          <h2>Log Your Visit</h2>
          <p id="student-name"></p>
        </div>

        <div id="error-msg" class="error-msg hidden"></div>
        <div id="success-msg" class="success-msg hidden"></div>

        <div class="form-group">
          <label>Reason for Visit</label>
          <div class="reason-grid">
            <button class="reason-btn" data-reason="Studying">
              <span class="reason-icon">📖</span>
              <span>Studying</span>
            </button>
            <button class="reason-btn" data-reason="Borrowing Books">
              <span class="reason-icon">📚</span>
              <span>Borrowing Books</span>
            </button>
            <button class="reason-btn" data-reason="Research">
              <span class="reason-icon">🔬</span>
              <span>Research</span>
            </button>
            <button class="reason-btn" data-reason="Group Work">
              <span class="reason-icon">👥</span>
              <span>Group Work</span>
            </button>
            <button class="reason-btn" data-reason="Printing">
              <span class="reason-icon">🖨️</span>
              <span>Printing</span>
            </button>
          </div>
        </div>

        <button id="submit-btn" class="login-btn" disabled>Log Visit</button>
      </div>
    </div>

    <script type="module" src="log-visit.js"></script>
  </body>
</html>
