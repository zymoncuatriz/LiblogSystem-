<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEU Library — Admin Login</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="admin-login.css" />
  </head>
  <body>
    <div class="bg-pattern">
      <div class="bg-circle bg-circle-1"></div>
      <div class="bg-circle bg-circle-2"></div>
      <div class="bg-circle bg-circle-3"></div>
      <div class="bg-circle bg-circle-4"></div>
      <div class="bg-circle bg-circle-5"></div>
    </div>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-icon">NEU</div>
          <div class="login-logo-text">
            <h1>Admin Portal</h1>
            <p>NEU Library Log System</p>
          </div>
        </div>

        <div class="admin-badge">
          <span>⚙️</span>
          <span>Administrator Access Only</span>
        </div>

        <div id="error-msg" class="error-msg hidden"></div>

        <button id="google-btn" class="btn-google">
          <img
            src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
            alt="Google"
            width="20"
            height="20"
          />
          Sign in with Google
        </button>

        <div class="back-link">
          <a href="index.html">← Back to Student Login</a>
        </div>
      </div>
    </div>

    <script type="module" src="admin-login.js"></script>
    <script>
      const saved = localStorage.getItem("theme");
      if (saved === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
  </body>
</html>
